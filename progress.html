<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HoopLab – Progress</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="d-flex flex-column min-vh-100 site-video-bg">
  <video class="bg-video" autoplay muted loop playsinline>
    <source src="assets/img/jaredtraining.mp4" type="video/mp4">
  </video>
  <div class="site-dark-overlay"></div>

  <nav class="navbar navbar-expand-lg navbar-dark navbar-transparent fixed-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">HoopLab</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav" aria-controls="nav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div id="nav" class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a href="programs.html" class="nav-link">Programs</a></li>
          <li class="nav-item"><a href="workouts.html" class="nav-link">Workouts</a></li>
          <li class="nav-item"><a href="calendar.html" class="nav-link">Plan</a></li>
          <li class="nav-item"><a href="nutrition.html" class="nav-link">Nutrition</a></li>
          <li class="nav-item"><a href="progress.html" class="nav-link">Progress</a></li>
          <li class="nav-item"><a href="resources.html" class="nav-link">Resources</a></li>
          <li class="nav-item"><a href="about.html" class="nav-link">About</a></li>
          <li class="nav-item"><a href="faq.html" class="nav-link">FAQ</a></li>
          <li class="nav-item ms-lg-2"><a href="contact.html" class="btn btn-primary">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="flex-grow-1">
    <section class="container py-5">
      <h1 class="mb-4">Progress</h1>

      <div class="row g-4">
        <div class="col-md-4">
          <div class="card h-100">
            <div class="card-body">
              <h5 class="card-title">BMI Calculator</h5>
              <div class="mb-2">
                <label class="form-label">Height (cm)</label>
                <input id="hcm" type="number" class="form-control" min="120" max="230">
              </div>
              <div class="mb-2">
                <label class="form-label">Weight (kg)</label>
                <input id="kg" type="number" class="form-control" min="30" max="200" step="0.1">
              </div>
              <button class="btn btn-primary" onclick="calcBMI()">Compute</button>
              <div id="bmi-out" class="alert alert-secondary mt-3 d-none"></div>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card h-100">
            <div class="card-body">
              <h5 class="card-title">Vertical Jump (cm)</h5>
              <div class="input-group mb-2">
                <input id="vj" type="number" class="form-control" min="10" max="150" step="0.1" placeholder="New PR">
                <button class="btn btn-outline-primary" onclick="addMetric('vertical')">Add</button>
              </div>
              <ul id="vertical-list" class="list-group small"></ul>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card h-100">
            <div class="card-body">
              <h5 class="card-title">20 m Sprint (s)</h5>
              <div class="input-group mb-2">
                <input id="sprint" type="number" class="form-control" min="2" max="10" step="0.01" placeholder="New time">
                <button class="btn btn-outline-primary" onclick="addMetric('sprint')">Add</button>
              </div>
              <ul id="sprint-list" class="list-group small"></ul>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="mt-auto py-4 bg-dark text-white">
    <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center">
      <p class="mb-2 mb-md-0">© 2025 HoopLab</p>
      <ul class="list-inline mb-0">
        <li class="list-inline-item"><a class="link-light" href="faq.html">FAQ</a></li>
        <li class="list-inline-item"><a class="link-light" href="contact.html">Contact</a></li>
      </ul>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/script.js" defer></script>
</body>
</html>
